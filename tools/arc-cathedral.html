canvas{display:block;position:fixed;top:0;left:0}

/* Narrative text during build */
#narration{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;text-align:center;pointer-events:none;transition:opacity 2s}

#narr-sub{font-size:0.55rem;color:rgba(255,245,220,0.3);letter-spacing:0.15em;text-transform:uppercase;margin-top:12px}

#counter.show{opacity:1}

#hud a:hover{color:rgba(197,150,12,0.8)}

h.",'1Cor':"A divided church — love, gifts, resurrection.",'2Cor':"Weakness as strength.",Gal:"Freedom from the Law.",Eph:"The cosmic Christ, spiritual warfare.",Phil:"Joy in all circumstances, from prison.",Col:"Christ supreme over all creation.",'1Thess':"Living in readiness for Christ's return.",'2Thess':"Clarifying the Day of the Lord.",'1Tim':"Instructions for church leadership.",'2Tim':"Paul's final letter — I have fought the good fight.",Titus:"Sound doctrine and good works.",Phlm:"Forgiveness and reconciliation.",Heb:"Christ is superior to everything.",Jas:"Faith without works is dead.",'1Pet':"Suffering with hope.",'2Pet':"Warning against false teachers.",'1John':"God is light. God is love.",'2John':"Walk in truth.",'3John':"Commending hospitality.",Jude:"Contend for the faith.",Rev:"Christ's ultimate victory. New heaven, new earth."};
const VERSES={Gen:1533,Exod:1213,Lev:859,Num:1288,Deut:959,Josh:658,Judg:618,Ruth:85,'1Sam':810,'2Sam':695,'1Kgs':816,'2Kgs':719,'1Chr':942,'2Chr':822,Ezra:280,Neh:406,Esth:167,Job:1070,Ps:2461,Prov:915,Eccl:222,Song:117,Isa:1292,Jer:1364,Lam:154,Ezek:1273,Dan:357,Hos:197,Joel:73,Amos:146,Obad:21,Jonah:48,Mic:105,Nah:47,Hab:56,Zeph:53,Hag:38,Zech:211,Mal:55,Matt:1071,Mark:678,Luke:1151,John:879,Acts:1007,Rom:433,'1Cor':437,'2Cor':257,Gal:149,Eph:155,Phil:104,Col:95,'1Thess':89,'2Thess':47,'1Tim':113,'2Tim':83,Titus:46,Phlm:25,Heb:303,Jas:108,'1Pet':105,'2Pet':61,'1John':105,'2John':13,'3John':15,Jude:25,Rev:404};
const DATES={Gen:'1400 BC',Exod:'1400 BC',Lev:'1400 BC',Num:'1400 BC',Deut:'1400 BC',Josh:'1350 BC',Judg:'1050 BC',Ruth:'1050 BC','1Sam':'930 BC','2Sam':'930 BC','1Kgs':'560 BC','2Kgs':'560 BC','1Chr':'450 BC','2Chr':'450 BC',Ezra:'440 BC',Neh:'430 BC',Esth:'470 BC',Job:'Unknown',Ps:'1000 BC',Prov:'950 BC',Eccl:'935 BC',Song:'950 BC',Isa:'700 BC',Jer:'600 BC',Lam:'586 BC',Ezek:'570 BC',Dan:'535 BC',Hos:'750 BC',Joel:'835 BC',Amos:'760 BC',Obad:'585 BC',Jonah:'760 BC',Mic:'700 BC',Nah:'660 BC',Hab:'607 BC',Zeph:'625 BC',Hag:'520 BC',Zech:'518 BC',Mal:'430 BC',Matt:'55 AD',Mark:'50 AD',Luke:'60 AD',John:'90 AD',Acts:'62 AD',Rom:'57 AD','1Cor':'55 AD','2Cor':'56 AD',Gal:'49 AD',Eph:'60 AD',Phil:'61 AD',Col:'60 AD','1Thess':'51 AD','2Thess':'51 AD','1Tim':'64 AD','2Tim':'67 AD',Titus:'64 AD',Phlm:'60 AD',Heb:'68 AD',Jas:'45 AD','1Pet':'64 AD','2Pet':'67 AD','1John':'90 AD','2John':'90 AD','3John':'90 AD',Jude:'65 AD',Rev:'95 AD'};
const SEC_CLR={'Torah':0xd4a843,'History':0x9e7a2e,'Poetry':0x6bb5ff,'Major Prophets':0xef5555,'Minor Prophets':0xe08850,'Gospels':0xfff0c8,'Church History':0x4dd88a,"Paul's Letters":0xb16dea,'General Letters':0x3dd88a,'Apocalyptic':0xff4444};
const OT_S=['Torah','History','Poetry','Major Prophets','Minor Prophets'];

// Narration script for the build sequence
const NARRATION=[
  {at:0, text:"In the beginning…", sub:"Genesis, ~1400 BC"},
  {at:5, text:"Moses writes the Law.\nFive books. One voice.", sub:"Torah · 1400 BC"},
  {at:12,text:"Histories unfold.\nKings rise and fall.", sub:"Joshua through Esther · 1350–430 BC"},
  {at:22,text:"Poets cry out to God.\nDavid sings what Moses taught.", sub:"Job, Psalms, Proverbs · 1000–935 BC"},
  {at:27,text:"Prophets see the future.\nIsaiah describes a man\nwho won't exist for 700 years.", sub:"Isaiah through Malachi · 835–430 BC"},
  {at:39,text:"Then silence.\nFour hundred years.\nNo prophets. No word.\nJust… waiting.", sub:"430 BC – 5 BC"},
  {at:39.5,text:"And then—", sub:""},
  {at:40,text:"A child is born in Bethlehem.\nExactly where Micah said he would be.\n700 years earlier.", sub:"The Gospels · ~5 BC – 33 AD"},
  {at:44,text:"The church explodes across the world.\nFishermen write theology\nthat agrees with shepherds\nwho lived a thousand years before them.", sub:"Acts through Revelation · 45–95 AD"},
  {at:60,text:"", sub:""},
  {at:66,text:"66 books. 40 authors.\n3 continents. 3 languages.\n1,500 years.\n\nOne story.", sub:""},
];

/* ═══════════ THREE.JS SETUP ═══════════ */
let scene,camera,renderer,composer,bloomPass;
let bookMeshes=[],arcLines=[],arcData=[];
let data,bookIdx={},selBook=-1,hovBook=-1;
let buildPhase=false,buildT=0,buildDone=false;
let mode='all',clock=new THREE.Clock();
let raycaster=new THREE.Raycaster();
let mouse=new THREE.Vector2(-999,-999);
let particleSystem;
let revealedCount=0;
let isMobile=innerWidth<700;

async function init(){
  // Scene
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x000000,0.003);

  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,1000);
  camera.position.set(0,15,isMobile?100:85);
  camera.lookAt(0,10,0);

  renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=0.8;
  document.body.prepend(renderer.domElement);

  // Bloom
  composer=new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene,camera));
  bloomPass=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.4,0.6,0.15);
  composer.addPass(bloomPass);

  // Load data
  try{
    const r=await fetch('../data/galaxy_data.json');
    data=await r.json();
  }catch(e){data={books:[],connections:[]};}
  data.connections.sort((a,b)=>b.count-a.count);
  data.books.forEach((bk,i)=>{bk._i=i;bookIdx[bk.abbr]=i;});

  buildBooks();
  buildArcsGeometry();
  buildParticles();
  buildStarfield();

  // Events
  addEventListener('resize',onResize);
  renderer.domElement.addEventListener('mousemove',onMove);
  renderer.domElement.addEventListener('click',onClk);
  renderer.domElement.addEventListener('touchstart',onTch,{passive:true});
  document.querySelectorAll('.mbtn').forEach(b=>b.addEventListener('click',e=>{
    mode=e.target.dataset.m;
    document.querySelectorAll('.mbtn').forEach(x=>x.classList.remove('on'));
    e.target.classList.add('on');
    desel();
    updateArcVisibility();
  }));

  // Intro animations
  setTimeout(()=>document.getElementById('intro-line1').classList.add('show'),500);
  setTimeout(()=>document.getElementById('intro-line2').classList.add('show'),2000);
  setTimeout(()=>document.getElementById('intro-stats').classList.add('show'),3500);
  setTimeout(()=>document.getElementById('intro-go').classList.add('show'),5000);

  animate();
}

/* ═══════════ BUILD BOOKS ═══════════ */
function buildBooks(){
  const n=data.books.length;
  // Semicircle: books from left to right, arcing upward
  const spread=isMobile?70:80; // total width
  const arcH=isMobile?8:10;    // how much the semicircle arcs up

  data.books.forEach((bk,i)=>{
    const t=i/(n-1);
    const x=(t-0.5)*spread;
    const y=Math.sin(t*Math.PI)*arcH;
    const z=0;

    // Ref count for sizing
    let refs=0;
    data.connections.forEach(c=>{if(c.from===bk.abbr||c.to===bk.abbr)refs+=c.count;});
    bk._refs=refs;
    bk._pos=new THREE.Vector3(x,y,z);

    const col=SEC_CLR[bk.section]||0xc5960c;
    const size=0.3+Math.min(refs/8000,0.6);

    // Sphere
    const geo=new THREE.SphereGeometry(size,16,16);
    const mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.copy(bk._pos);
    mesh.userData={idx:i,abbr:bk.abbr,name:bk.name,section:bk.section,refs,size,col};
    scene.add(mesh);
    bookMeshes.push(mesh);

    // Point light glow
    const glow=new THREE.PointLight(col,0,8);
    glow.position.copy(bk._pos);
    scene.add(glow);
    mesh.userData.light=glow;
  });
}

/* ═══════════ BUILD ARCS ═══════════ */
function buildArcsGeometry(){
  const maxC=data.connections[0]?.count||1;

  data.connections.forEach((cn,ci)=>{
    const fi=bookIdx[cn.from];
    const ti=bookIdx[cn.to];
    if(fi===undefined||ti===undefined)return;

    const fp=data.books[fi]._pos;
    const tp=data.books[ti]._pos;
    const str=cn.count/maxC;

    // Arc: quadratic bezier going upward
    const mid=new THREE.Vector3().addVectors(fp,tp).multiplyScalar(0.5);
    const dist=fp.distanceTo(tp);
    mid.y+=10+dist*0.35+str*8; // height of arc
    mid.z-=2+str*3; // pull slightly toward camera for depth

    const curve=new THREE.QuadraticBezierCurve3(fp.clone(),mid,tp.clone());
    const pts=curve.getPoints(32);
    const geo=new THREE.BufferGeometry().setFromPoints(pts);

    const fc=SEC_CLR[data.books[fi].section]||0xc5960c;
    const tc=SEC_CLR[data.books[ti].section]||0xc5960c;
    const mc=new THREE.Color(fc).lerp(new THREE.Color(tc),0.5);

    const mat=new THREE.LineBasicMaterial({
      color:mc,transparent:true,opacity:0,
      linewidth:1,depthWrite:false,blending:THREE.AdditiveBlending
    });

    const line=new THREE.Line(geo,mat);
    line.userData={fi,ti,str,cn,fOT:OT_S.includes(data.books[fi].section),tOT:OT_S.includes(data.books[ti].section)};
    line.frustumCulled=false;
    scene.add(line);
    arcLines.push(line);
    arcData.push({line,str,fi,ti,targetOpacity:0,revealed:false});
  });
}

/* ═══════════ PARTICLES ═══════════ */
function buildParticles(){
  const count=isMobile?1000:3000;
  const positions=new Float32Array(count*3);
  const colors=new Float32Array(count*3);
  const sizes=new Float32Array(count);

  for(let i=0;i<count;i++){
    // Cluster particles around where arcs will be
    const t=Math.random();
    const x=(t-0.5)*90;
    const y=Math.random()*50-5;
    const z=(Math.random()-0.5)*20;
    positions[i*3]=x;positions[i*3+1]=y;positions[i*3+2]=z;

    const gold=Math.random()*0.3;
    colors[i*3]=0.77+gold;colors[i*3+1]=0.59+gold*0.5;colors[i*3+2]=0.05+gold*0.2;
    sizes[i]=Math.random()*1.5+0.3;
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));

  const mat=new THREE.PointsMaterial({
    size:0.15,vertexColors:true,transparent:true,opacity:0.15,
    blending:THREE.AdditiveBlending,depthWrite:false,
    sizeAttenuation:true
  });

  particleSystem=new THREE.Points(geo,mat);
  scene.add(particleSystem);
}

/* ═══════════ STARFIELD ═══════════ */
function buildStarfield(){
  const n=2000;
  const pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    pos[i*3]=(Math.random()-0.5)*500;
    pos[i*3+1]=(Math.random()-0.5)*500;
    pos[i*3+2]=-50-Math.random()*200;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color:0xfff5dc,size:0.12,transparent:true,opacity:0.4,depthWrite:false});
  scene.add(new THREE.Points(geo,mat));
}

/* ═══════════ BUILD ANIMATION ═══════════ */
function startBuild(){
  buildPhase=true;buildT=0;revealedCount=0;
  document.getElementById('counter').classList.add('show');
  document.getElementById('narration').classList.remove('hidden');
}

function updateBuild(dt){
  // Reveal books one at a time over ~12 seconds total
  const bookDuration=12; // seconds to reveal all 66 books
  buildT+=dt;

  const booksToShow=Math.min(66,Math.floor((buildT/bookDuration)*66));

  // Reveal books
  for(let i=0;i<booksToShow&&i<bookMeshes.length;i++){
    const m=bookMeshes[i];
    if(m.material.opacity<1){
      m.material.opacity=Math.min(1,m.material.opacity+dt*2);
      m.userData.light.intensity=m.material.opacity*0.5;
    }
  }

  // Reveal arcs progressively — strongest first, tied to which books are visible
  let count=0;
  for(let i=0;i<arcData.length;i++){
    const ad=arcData[i];
    if(ad.fi<booksToShow&&ad.ti<booksToShow){
      if(!ad.revealed){
        ad.revealed=true;
        ad.targetOpacity=getArcOpacity(ad.str);
      }
      count+=ad.line.userData.cn.count;
      ad.line.material.opacity=Math.min(ad.targetOpacity,ad.line.material.opacity+dt*0.8);
    }
  }

  revealedCount=count;
  document.getElementById('cnt-num').textContent=revealedCount.toLocaleString();

  // Narration
  updateNarration(booksToShow);

  // Camera slowly pulls back during build
  if(buildT<bookDuration){
    const p=buildT/bookDuration;
    camera.position.y=15+p*5;
    camera.position.z=(isMobile?100:85)+p*15;
  }

  // Done?
  if(buildT>bookDuration+3&&!buildDone){
    buildDone=true;
    document.getElementById('narration').classList.add('hidden');
    setTimeout(()=>{
      document.getElementById('counter').classList.remove('show');
      document.getElementById('hud').classList.add('show');
      document.getElementById('modes').classList.add('show');
    },2000);

    // Show final narration
    showNarr("66 books. 40 authors.\n3 continents. 3 languages.\n1,500 years.\n\nOne story.","");
    setTimeout(()=>document.getElementById('narration').classList.add('hidden'),6000);
  }
}

let lastNarrIdx=-1;
function updateNarration(booksShown){
  let best=-1;
  for(let i=NARRATION.length-1;i>=0;i--){
    if(booksShown>=NARRATION[i].at){best=i;break;}
  }
  if(best!==lastNarrIdx&&best>=0){
    lastNarrIdx=best;
    showNarr(NARRATION[best].text,NARRATION[best].sub);
  }
}

function showNarr(text,sub){
  const el=document.getElementById('narration');
  el.classList.add('hidden');
  setTimeout(()=>{
    document.getElementById('narr-text').innerHTML=text.replace(/\n/g,'<br>');
    document.getElementById('narr-sub').textContent=sub;
    el.classList.remove('hidden');
  },500);
}

/* ═══════════ ARC VISIBILITY ═══════════ */
function getArcOpacity(str){
  if(selBook>=0)return 0; // handled separately
  return Math.min(0.5,0.01+str*0.5);
}

function updateArcVisibility(){
  arcData.forEach(ad=>{
    const l=ad.line;const u=l.userData;
    let show=true;

    if(mode==='strong'&&ad.str<0.15)show=false;
    if(mode==='ot-nt'&&u.fOT===u.tOT)show=false;

    if(selBook>=0){
      const sa=data.books[selBook].abbr;
      const isConn=(u.cn.from===sa||u.cn.to===sa);
      ad.targetOpacity=isConn?0.15+ad.str*0.7:0.003;
    }else{
      ad.targetOpacity=show?(0.01+ad.str*0.5):0;
    }
  });
}

/* ═══════════ INTERACTION ═══════════ */
function onMove(e){
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(bookMeshes);
  const newHov=hits.length?hits[0].object.userData.idx:-1;
  if(newHov!==hovBook){
    hovBook=newHov;
    renderer.domElement.style.cursor=hovBook>=0?'pointer':'';
    updateTip(e.clientX,e.clientY);
  }else if(hovBook>=0){
    updateTip(e.clientX,e.clientY);
  }
}

function onClk(e){
  if(!buildDone)return;
  const hit=getHit(e.clientX,e.clientY);
  if(hit>=0){hit===selBook?desel():sel(hit);}
  else desel();
}

function onTch(e){
  if(!buildDone)return;
  const t=e.touches[0];
  mouse.x=(t.clientX/innerWidth)*2-1;
  mouse.y=-(t.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(bookMeshes);
  if(hits.length){
    const idx=hits[0].object.userData.idx;
    idx===selBook?desel():sel(idx);
  }else desel();
}

function getHit(cx,cy){
  mouse.x=(cx/innerWidth)*2-1;
  mouse.y=-(cy/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const h=raycaster.intersectObjects(bookMeshes);
  return h.length?h[0].object.userData.idx:-1;
}

function updateTip(cx,cy){
  const tt=document.getElementById('tip');
  if(hovBook<0||isMobile){tt.style.display='none';return;}
  const bk=data.books[hovBook];
  tt.querySelector('.tp-n').textContent=bk.name;
  tt.querySelector('.tp-d').textContent=`${(VERSES[bk.abbr]||0).toLocaleString()} verses · ${bk._refs.toLocaleString()} refs · ${DATES[bk.abbr]||''}`;
  tt.style.display='block';
  tt.style.left=(cx+12)+'px';
  tt.style.top=(cy-22)+'px';
}

function sel(idx){
  selBook=idx;
  const bk=data.books[idx];
  const conns=data.connections.filter(c=>c.from===bk.abbr||c.to===bk.abbr);
  const total=conns.reduce((s,c)=>s+c.count,0);

  // Rank
  const ranks=data.books.map(b=>({a:b.abbr,t:b._refs})).sort((a,b)=>b.t-a.t);

  document.getElementById('i-name').textContent=bk.name;
  document.getElementById('i-det').textContent=`${bk.chapters} chapters · ${(VERSES[bk.abbr]||0).toLocaleString()} verses · ${bk.section}`;
  document.getElementById('i-desc').textContent=DESCS[bk.abbr]||'';
  document.getElementById('i-refs').textContent=total.toLocaleString();
  document.getElementById('i-books').textContent=conns.length;
  document.getElementById('i-rank').textContent='#'+(ranks.findIndex(r=>r.a===bk.abbr)+1);
  document.getElementById('i-date').textContent=DATES[bk.abbr]||'—';

  const tags=document.getElementById('info-tags');tags.innerHTML='';
  conns.sort((a,b)=>b.count-a.count).slice(0,10).forEach(c=>{
    const other=c.from===bk.abbr?c.to:c.from;
    const ob=data.books.find(b=>b.abbr===other);if(!ob)return;
    const t=document.createElement('span');t.className='itag';
    t.textContent=`${ob.name} (${c.count})`;
    t.onclick=()=>sel(ob._i);
    tags.appendChild(t);
  });

  const ip=document.getElementById('info');
  if(!isMobile){
    // Position near the book on desktop
    const pos=data.books[idx]._pos.clone().project(camera);
    const sx=(pos.x*0.5+0.5)*innerWidth;
    ip.style.left=Math.min(sx+20,innerWidth-290)+'px';
    ip.style.top=Math.max(50,Math.min((0.5-pos.y*0.5)*innerHeight-60,innerHeight-300))+'px';
  }
  ip.classList.add('show');

  // Update book visuals
  bookMeshes.forEach((m,i)=>{
    const isConn=conns.some(c=>c.from===m.userData.abbr||c.to===m.userData.abbr);
    m.userData._dim=i!==idx&&!isConn;
  });

  updateArcVisibility();
}

window.desel=function(){
  selBook=-1;
  document.getElementById('info').classList.remove('show');
  bookMeshes.forEach(m=>{m.userData._dim=false;});
  updateArcVisibility();
};

/* ═══════════ ANIMATE ═══════════ */
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  const t=clock.elapsedTime;

  // Build phase
  if(buildPhase&&!buildDone)updateBuild(dt);

  // Smooth arc opacity
  arcData.forEach(ad=>{
    const cur=ad.line.material.opacity;
    const tgt=ad.targetOpacity;
    if(Math.abs(cur-tgt)>0.001){
      ad.line.material.opacity+=(tgt-cur)*Math.min(dt*3,0.3);
    }
  });

  // Book pulse
  bookMeshes.forEach((m,i)=>{
    if(!buildDone&&!buildPhase)return;
    const dim=m.userData._dim;
    const isSel=i===selBook;
    const isHov=i===hovBook;
    const tgtOp=dim?0.1:(isSel?1:isHov?0.95:0.7);
    m.material.opacity+=(tgtOp-m.material.opacity)*Math.min(dt*5,0.3);

    const pulse=Math.sin(t*1.5+i*0.5)*0.15+0.85;
    const lightI=dim?0.02:(isSel?1.5:isHov?0.8:0.3)*pulse;
    m.userData.light.intensity+=(lightI-m.userData.light.intensity)*Math.min(dt*3,0.2);

    // Hover scale
    const tgtS=isSel?2:isHov?1.5:1;
    const cs=m.scale.x;
    const ns=cs+(tgtS-cs)*Math.min(dt*8,0.3);
    m.scale.setScalar(ns);
  });

  // Particle drift
  if(particleSystem){
    const pos=particleSystem.geometry.attributes.position.array;
    for(let i=0;i<pos.length;i+=3){
      pos[i+1]+=dt*0.3; // drift up
      if(pos[i+1]>55)pos[i+1]=-10;
    }
    particleSystem.geometry.attributes.position.needsUpdate=true;
    particleSystem.rotation.y+=dt*0.01;
  }

  // Gentle camera sway (after build)
  if(buildDone){
    camera.position.x=Math.sin(t*0.1)*3;
    camera.position.y=20+Math.sin(t*0.15)*1.5;
  }

  composer.render();
}

/* ═══════════ RESIZE ═══════════ */
function onResize(){
  isMobile=innerWidth<700;
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
}

/* ═══════════ START ═══════════ */
window.beginBuild=function(){
  document.getElementById('intro').classList.add('gone');
  setTimeout(startBuild,1500);
};

init();
</script>
